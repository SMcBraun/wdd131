<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Samoa</title>

    <meta name="description"
        content="Explore Samoa through responsive web design featuring country facts, weather information and scenic island imagery.">

    <meta name="author" content="Sina McBraun">

    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">

    <script src="scripts/place.js" defer></script>
</head>


<body>

    <header>
        <h1>Samoa</h1>
    </header>

    <main>
        <!-- HERO IMAGE -->
        <picture>
            <source srcset="images/samoa-small.webp" media="(max-width: 600px)">

            <source <img src="images/samoa-large.webp" media="(min-width: 601px)">

            <img src="images/samoa-large.webp" alt="Beautiful view of Samoa" width="1200" height="600">

        </picture>

        <!-- DATA SECTION -->
        <section class="data">
            <h2>Data</h2>

            <p><strong>Capital:</strong> Apia</p>
            <p><strong>Population:</strong> 225,000</p>
            <p><strong>Language:</strong> Samoan, English</p>
            <p><strong>Currency:</strong> Samoan Tala</p>
            <p><strong>Area:</strong> 2,842 km²</p>
        </section>

        <!-- WEATHER SECTION -->
        <section class="weather">
            <h2 class="weather-heading">Weather</h2>

            <img src="images/weather.svg" alt="Partly cloudy weather icon" class="weather-icon" width="40" height="40">

            <p><strong>Temperature:</strong> 28° C</p>
            <p><strong>Conditions:</strong> Partly Cloudy</p>
            <p><strong>Wind Speed:</strong> 10km/h</p>

            <p>
                <strong>Wind Chill:</strong>
                <span id="windchill"></span>
            </p>
        </section>

    </main>

    <footer>
        <p>&copy; <span id="year"></span>🌴 Sina🌴 Samoa</p>

        <p id="lastModified"></p>
    </footer>



</body>

</html>
