<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Product review form">
    <meta name="author" content="Sina McBraun">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <link rel="stylesheet" href="styles/form.css">
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html" class="review-form">

            <label for="product">Product Name</label>
            <select id="product" name="product" required>
                <option value="" disabled selected>Select a Product...</option>
            </select>

            <fieldset class="rating">
                <legend>Overall Rating</legend>

                <label><input type="radio" id="rating1" name="rating" value="1" required> ☆</label>
                <label><input type="radio" id="rating2" name="rating" value="2" required> ☆☆</label>
                <label><input type="radio" id="rating3" name="rating" value="3" required> ☆☆☆</label>
                <label><input type="radio" id="rating4" name="rating" value="4" required> ☆☆☆☆</label>
                <label><input type="radio" id="rating5" name="rating" value="5" required> ☆☆☆☆☆</label>

            </fieldset>

            <label for="installDate">Date of Installation</label>
            <input type="date" id="installDate" name="installDate" required>

            <fieldset>
                <legend>Useful Features</legend>
                <label><input type="checkbox" id="durability" name="features" value="durability"> Durability</label>
                <label><input type="checkbox" id="ease" name="features" value="ease-of-use"> Ease of Use</label>
                <label><input type="checkbox" id="performance" name="features" value="performance"> Performance</label>
                <label><input type="checkbox" id="design" name="features" value="design"> Design</label>
            </fieldset>

            <label for="review">Written Review <span>(Optional)</span></label>
            <textarea id="review" name="review"></textarea>

            <label for="username">Your Name <span>(Optional)</span></label>
            <input type="text" id="username" name="username">

            <input type="submit" value="Post Review">

        </form>


    </main>

    <footer>
        <p>&copy; 2026 🌺 Sina McBraun 🌺 Hawaii</p>
        <p id="lastModified"></p>
    </footer>

    <script src="scripts/form.js"></script>
</body>

</html>
